server: # REST and WS server settings
  port: 2333
  address: 0.0.0.0
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1" # Plugin YouTube yang Anda miliki
  server:
    password: "youshallnotpass"
    sources:
      youtube: false # Matikan source bawaan jika menggunakan plugin youtube-plugin
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters: # Enable all filters
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400 # The duration of the binary buffer. Typical values are 400ms-1500ms
    frameBufferDurationMs: 5000 # How many milliseconds of audio to keep buffered
    opusEncodingQuality: 10 # Opus encoder quality. Valid values range from 0 to 10
    resamplingQuality: LOW # Resampling quality. Valid values are LOW, MEDIUM and HIGH
    trackStuckThresholdMs: 10000 # The threshold for how long a track can be stuck
    useSeekGhosting: true # Seek ghosting effect
    youtubePlaylistLoadLimit: 6 # Number of pages at 100 each
    playerUpdateInterval: 5 # How frequently to send player updates to clients (seconds)

logging:
  file:
    path: ./logs/lavalink.log
  level:
    root: INFO
    lavalink: INFO

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

plugins:
  youtube:
    enabled: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - "MUSIC"
      - "ANDROID_VR"
      - "WEB"
      - "WEB_REMIX"